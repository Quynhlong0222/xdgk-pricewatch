name: Cao gia hang ngay

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cao-gia-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Cai Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cao gia
        run: python crawl.py

      - name: Luu ket qua
        shell: bash
        run: |
          if git diff --quiet -- gia-lich-su.json; then
            echo "Khong co thay doi gia-lich-su.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gia-lich-su.json
          git commit -m "Cap nhat gia $(TZ='Asia/Ho_Chi_Minh' date +'%d/%m/%Y %H:%M')"
          git push
